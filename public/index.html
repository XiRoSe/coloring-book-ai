<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📚 יוצר חוברות ילדים</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      background: #fef9f0;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: white;
      border-bottom: 3px solid #fde68a;
      padding: 20px 32px;
      display: flex; align-items: center; gap: 14px;
    }
    .logo { font-size: 2rem; }
    header h1 { font-size: 1.4rem; font-weight: 900; color: #1e293b; }
    header p { font-size: 0.82rem; color: #64748b; margin-top: 2px; }

    /* Main */
    main { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

    /* Input card */
    .input-card {
      background: white; border-radius: 24px;
      border: 2px solid #e2e8f0;
      padding: 32px; margin-bottom: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .input-card h2 { font-size: 1.15rem; font-weight: 800; color: #1e293b; margin-bottom: 20px; }

    /* Style picker */
    .style-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px;
    }
    .style-btn {
      padding: 14px 10px; border-radius: 14px; border: 2px solid #e2e8f0;
      background: white; cursor: pointer; text-align: center;
      transition: all 0.15s; font-family: 'Heebo', sans-serif;
    }
    .style-btn:hover { border-color: #fbbf24; background: #fffbeb; }
    .style-btn.active { border-color: #f59e0b; background: #fef3c7; }
    .style-icon { font-size: 2rem; display: block; margin-bottom: 6px; }
    .style-name { font-size: 0.85rem; font-weight: 700; color: #1e293b; }
    .style-desc { font-size: 0.72rem; color: #64748b; margin-top: 3px; }

    /* Prompt input */
    .prompt-wrap { position: relative; margin-bottom: 20px; }
    textarea {
      width: 100%; padding: 16px 18px; border-radius: 14px;
      border: 2px solid #e2e8f0; font-family: 'Heebo', sans-serif;
      font-size: 0.95rem; resize: none; direction: rtl;
      transition: border-color 0.15s; background: #f8fafc;
      color: #1e293b; line-height: 1.6;
    }
    textarea:focus { outline: none; border-color: #fbbf24; background: white; }
    textarea::placeholder { color: #94a3b8; }

    /* Pages count */
    .count-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .count-row label { font-size: 0.88rem; font-weight: 700; color: #475569; }
    .count-btns { display: flex; gap: 6px; }
    .count-btn {
      width: 36px; height: 36px; border-radius: 99px;
      border: 2px solid #e2e8f0; background: white;
      font-weight: 700; font-size: 0.9rem; cursor: pointer;
      transition: all 0.15s; font-family: 'Heebo', sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .count-btn.active { border-color: #f59e0b; background: #fef3c7; color: #92400e; }

    /* Generate button */
    .btn-generate {
      width: 100%; padding: 16px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white; font-family: 'Heebo', sans-serif;
      font-size: 1rem; font-weight: 800; cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-generate:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Examples */
    .examples { margin-top: 16px; }
    .examples-label { font-size: 0.75rem; font-weight: 700; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
    .examples-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .example-chip {
      padding: 6px 14px; border-radius: 99px; border: 1.5px solid #e2e8f0;
      background: white; font-size: 0.8rem; font-family: 'Heebo', sans-serif;
      color: #475569; cursor: pointer; transition: all 0.12s;
    }
    .example-chip:hover { border-color: #fbbf24; color: #92400e; background: #fffbeb; }

    /* Progress */
    .progress-wrap {
      display: none; text-align: center; padding: 32px;
      background: white; border-radius: 24px; border: 2px solid #e2e8f0;
      margin-bottom: 32px;
    }
    .progress-wrap.show { display: block; }
    .progress-anim { font-size: 3rem; animation: spin 1.5s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-text { font-size: 1rem; font-weight: 700; color: #475569; margin-top: 16px; }
    .progress-bar-wrap { background: #f1f5f9; border-radius: 99px; height: 8px; margin: 16px auto; max-width: 300px; }
    .progress-bar { background: linear-gradient(90deg, #f59e0b, #ef4444); height: 100%; border-radius: 99px; transition: width 0.5s; width: 0%; }
    .progress-sub { font-size: 0.8rem; color: #94a3b8; }

    /* Results grid */
    .results { display: none; }
    .results.show { display: block; }
    .results-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .results-header h2 { font-size: 1.1rem; font-weight: 800; color: #1e293b; }
    .btn-download-all {
      padding: 10px 22px; border-radius: 99px; border: none;
      background: #1e293b; color: white; font-family: 'Heebo', sans-serif;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .btn-download-all:hover { background: #334155; }

    .pages-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .page-card {
      background: white; border-radius: 18px; border: 2px solid #e2e8f0;
      overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .page-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    .page-card img { width: 100%; display: block; aspect-ratio: 3/4; object-fit: cover; }
    .page-card-footer {
      padding: 12px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .page-num { font-size: 0.8rem; font-weight: 700; color: #94a3b8; }
    .btn-dl {
      padding: 6px 14px; border-radius: 99px; border: 1.5px solid #e2e8f0;
      background: white; font-family: 'Heebo', sans-serif;
      font-size: 0.75rem; font-weight: 700; cursor: pointer; color: #475569;
      transition: all 0.12s; text-decoration: none; display: inline-block;
    }
    .btn-dl:hover { border-color: #fbbf24; background: #fffbeb; color: #92400e; }

    /* Loading placeholder */
    .page-placeholder {
      background: #f8fafc; border-radius: 18px; border: 2px dashed #e2e8f0;
      aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center;
      font-size: 2rem; animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

    @media (max-width: 600px) {
      .style-grid { grid-template-columns: 1fr 1fr; }
      .count-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🎨</div>
  <div>
    <h1>יוצר חוברות ילדים</h1>
    <p>צביעה · חיבור נקודות · דפי פעילות — מוכן להדפסה</p>
  </div>
</header>

<main>
  <div class="input-card">
    <h2>✏️ בחר סוג ותאר מה תרצה</h2>

    <div class="style-grid">
      <button class="style-btn active" data-style="coloring" onclick="selectStyle(this)">
        <span class="style-icon">🖍️</span>
        <div class="style-name">דפי צביעה</div>
        <div class="style-desc">קווים עבים לצביעה</div>
      </button>
      <button class="style-btn" data-style="dotted" onclick="selectStyle(this)">
        <span class="style-icon">🔢</span>
        <div class="style-name">חיבור נקודות</div>
        <div class="style-desc">נקודות ממוספרות</div>
      </button>
      <button class="style-btn" data-style="tracing" onclick="selectStyle(this)">
        <span class="style-icon">✍️</span>
        <div class="style-name">דפי עקיבה</div>
        <div class="style-desc">קווים מקווקווים</div>
      </button>
    </div>

    <div class="prompt-wrap">
      <textarea id="prompt" rows="3" placeholder="לדוגמה: דינוזאורים חמודים ביער, כלבלב משחק בפארק, נסיכה עם חד קרן..."></textarea>
    </div>

    <div class="count-row">
      <label>מספר דפים:</label>
      <div class="count-btns">
        <button class="count-btn" onclick="setCount(1)">1</button>
        <button class="count-btn active" onclick="setCount(2)">2</button>
        <button class="count-btn" onclick="setCount(4)">4</button>
        <button class="count-btn" onclick="setCount(6)">6</button>
      </div>
    </div>

    <button class="btn-generate" onclick="generate()">
      <span>🎨</span> צור חוברת
    </button>

    <div class="examples">
      <div class="examples-label">דוגמאות מהירות</div>
      <div class="examples-row">
        <button class="example-chip" onclick="setExample(this)">🦁 אריה בג'ונגל</button>
        <button class="example-chip" onclick="setExample(this)">🦋 פרפרים ופרחים</button>
        <button class="example-chip" onclick="setExample(this)">🚂 רכבת קיטור</button>
        <button class="example-chip" onclick="setExample(this)">🧜 בת ים</button>
        <button class="example-chip" onclick="setExample(this)">🚀 חללאים וחלל</button>
        <button class="example-chip" onclick="setExample(this)">🐉 דרקון ידידותי</button>
      </div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progress">
    <div class="progress-anim">🎨</div>
    <div class="progress-text" id="progress-text">יוצר דפים...</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-sub" id="progress-sub">זה לוקח כ-20-30 שניות לדף</div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-header">
      <h2 id="results-title">🖼️ החוברת שלך מוכנה!</h2>
      <button class="btn-download-all" onclick="downloadAll()">⬇️ הורד הכל</button>
    </div>
    <div class="pages-grid" id="pages-grid"></div>
  </div>
</main>

<script>
let selectedStyle = 'coloring';
let selectedCount = 2;
let generatedImages = [];

function selectStyle(btn) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedStyle = btn.dataset.style;
}

function setCount(n) {
  selectedCount = n;
  document.querySelectorAll('.count-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === n);
  });
}

function setExample(btn) {
  document.getElementById('prompt').value = btn.textContent.replace(/^[^ ]+ /, '').trim();
  btn.textContent.includes('🦁') ? document.getElementById('prompt').value = 'אריה חמוד ביער עם עצים גדולים' :
  btn.textContent.includes('🦋') ? document.getElementById('prompt').value = 'פרפרים צבעוניים מעל שדה פרחים' :
  btn.textContent.includes('🚂') ? document.getElementById('prompt').value = 'רכבת קיטור עוברת בין הרים' :
  btn.textContent.includes('🧜') ? document.getElementById('prompt').value = 'בת ים מתחת לים עם דגים ואלמוגים' :
  btn.textContent.includes('🚀') ? document.getElementById('prompt').value = 'חללאי חמוד על הירח עם כוכבים' :
  document.getElementById('prompt').value = 'דרקון ידידותי עם ילדה קטנה ביער קסום';
}

async function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) { alert('נא להכניס תיאור!'); return; }

  generatedImages = [];
  const btn = document.querySelector('.btn-generate');
  btn.disabled = true;
  document.getElementById('results').classList.remove('show');
  document.getElementById('progress').classList.add('show');

  const grid = document.getElementById('pages-grid');
  grid.innerHTML = '';

  // Show placeholders
  for (let i = 0; i < selectedCount; i++) {
    const ph = document.createElement('div');
    ph.className = 'page-placeholder';
    ph.id = `placeholder-${i}`;
    ph.innerHTML = '🎨';
    grid.appendChild(ph);
  }

  let done = 0;
  const updateProgress = () => {
    const pct = Math.round((done / selectedCount) * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-text').textContent = `יוצר דף ${done + 1} מתוך ${selectedCount}...`;
  };
  updateProgress();

  // Generate all pages in parallel
  const promises = Array.from({ length: selectedCount }, (_, i) =>
    fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, style: selectedStyle })
    })
    .then(r => r.json())
    .then(data => {
      done++;
      updateProgress();
      const ph = document.getElementById(`placeholder-${i}`);
      if (data.url) {
        generatedImages.push({ url: data.url, index: i });
        const card = document.createElement('div');
        card.className = 'page-card';
        card.innerHTML = `
          <img src="${data.url}" alt="דף ${i + 1}" loading="lazy"/>
          <div class="page-card-footer">
            <span class="page-num">דף ${i + 1}</span>
            <a href="${data.url}" download="page-${i+1}.png" class="btn-dl" target="_blank">⬇️ הורד</a>
          </div>`;
        ph.replaceWith(card);
      } else {
        ph.innerHTML = '❌';
      }
    })
    .catch(() => { done++; updateProgress(); })
  );

  await Promise.all(promises);

  document.getElementById('progress').classList.remove('show');
  document.getElementById('results').classList.add('show');
  document.getElementById('results-title').textContent = `🖼️ ${selectedCount} דפים מוכנים להדפסה!`;
  btn.disabled = false;
}

async function downloadAll() {
  for (const img of generatedImages) {
    const a = document.createElement('a');
    a.href = img.url;
    a.download = `coloring-page-${img.index + 1}.png`;
    a.target = '_blank';
    a.click();
    await new Promise(r => setTimeout(r, 300));
  }
}
</script>
</body>
</html>
